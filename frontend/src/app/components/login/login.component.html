<div class="auth-wrapper" style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
  <div class="auth-card glass-panel animate-fade-in" style="width: 100%; max-width: 480px; padding: 3rem;">
      <div class="text-center mb-4">
          <h2 style="color: var(--primary-color);">System Login</h2>
          <p>Enter your credentials to access the portal.</p>
      </div>

      <div *ngIf="alertMsg" class="alert" [ngClass]="'alert-' + alertType">{{ alertMsg }}</div>

      <form (ngSubmit)="onLogin()">
          <div class="form-group">
              <label class="form-label">Email Address</label>
              <input type="email" class="form-control" [(ngModel)]="email" name="email" required placeholder="admin@company.com">
          </div>

          <div class="form-group">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" [(ngModel)]="password" name="password" required placeholder="••••••••">
          </div>

          <button type="submit" class="btn btn-primary btn-block" [disabled]="isLoading">
              {{ isLoading ? 'Authenticating...' : 'Sign In' }}
          </button>
      </form>

      <div class="text-center mt-4">
          <p>New visitor? <a routerLink="/register" style="color: var(--primary-color); text-decoration: none;">Pre-register here</a></p>
      </div>
      
      <div class="text-center mt-4" style="border-top: 1px solid var(--surface-border); padding-top: 1rem; display: flex; gap: 1rem; justify-content: center;">
          <a routerLink="/admin" style="font-size: 0.8rem; color: var(--text-secondary); text-decoration: none;">Admin Panel</a>
          <a routerLink="/reception" style="font-size: 0.8rem; color: var(--text-secondary); text-decoration: none;">Reception</a>
          <a routerLink="/gate" style="font-size: 0.8rem; color: var(--text-secondary); text-decoration: none;">Gate Kiosk</a>
      </div>
  </div>
</div>
